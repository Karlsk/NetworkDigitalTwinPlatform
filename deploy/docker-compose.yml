services:
  neo4j:
    image: neo4j:2026.03.1
    container_name: neo4j-twin
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./neo4j-vol/data:/data
      - ./neo4j-vol/logs:/logs
      - ./neo4j-vol/import:/import
      - ./neo4j-vol/plugins:/plugins
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,n10s.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,n10s.*
      - NEO4J_server_config_strict__validation_enabled=false
    restart: always
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password123", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
      CONFIG_PATH: configs/config.yaml
      ONTOLOGY_DIR: /app/ontology
      SNAPSHOT_DIR: /app/snapshots
    volumes:
      - ../ontology:/app/ontology:ro
      - snapshot_data:/app/snapshots

volumes:
  neo4j_data:
  neo4j_logs:
  snapshot_data:
