services:
  neo4j:
    image: neo4j:2026.03.1
    container_name: neo4j-twin
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./neo4j-vol/data:/data
      - ./neo4j-vol/logs:/logs
      - ./neo4j-vol/import:/import
      - ./neo4j-vol/plugins:/plugins
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,n10s.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,n10s.*
      - NEO4J_server_config_strict__validation_enabled=false
    restart: always
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password123", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/confluent-local:8.2.2
    container_name: kafka-twin
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://localhost:9093,BROKER://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${KAFKA_HOST}:9092,BROKER://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: BROKER
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,BROKER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    depends_on:
      neo4j:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123
      CONFIG_PATH: configs/config.yaml
      ONTOLOGY_DIR: /app/ontology
      SNAPSHOT_DIR: /app/snapshots
      # 数据源层 (DataSource Layer)
      KAFKA_ENABLED: "false"
      KAFKA_BROKERS: "host.docker.internal:9092"
      KAFKA_TOPIC: "sync-events"
      KAFKA_GROUP_ID: "network-twin"
      # 事件总线层 (EventBus Layer)
      EVENT_BUS_MODE: "channel"  # 或 "kafka"，Fallback 仅在此层生效
    volumes:
      - ../ontology:/app/ontology:ro
      - snapshot_data:/app/snapshots

volumes:
  neo4j_data:
  neo4j_logs:
  snapshot_data:
