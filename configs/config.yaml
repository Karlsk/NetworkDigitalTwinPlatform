# 服务全局配置
neo4j:
  uri: "bolt://172.17.1.224:7687"
  user: "neo4j"
  password: "password123"
  default_db: "neo4j"

server:
  port: 8080

snapshot:
  dir: "snapshots"
  max_active: 5
  retention_days: 30  # 0 = 不自动清理

schema:
  ontology_dir: "ontology"

channel:
  buffer_size: 100        # EventBus Channel 模式缓冲区大小

# ==================== 数据源层 (DataSource Layer) ====================
# 负责从外部系统接收数据变更事件
# 支持两种数据源：Webhook（HTTP 回调）和 Kafka（消息队列）
kafka:
  enabled: true                       # 启用 Kafka DataSource Consumer
  brokers: ["172.17.1.224:9092"]
  topic: "external-sync-events"       # 外部事件 Topic（DataSource 层）
  group_id: "network-twin"

# ==================== 事件总线层 (EventBus Layer) ====================
# 数据源和图数据库写入之间的中间管道层
# 支持两种实现："channel"（内存）和 "kafka"（持久化）
# Fallback 机制仅作用于 EventBus 层：当 mode=kafka 且 Kafka 不可用时自动降级到 channel
event_bus:
  mode: "kafka"                       # 使用 Kafka 模式（含 FallbackPublisher）
  kafka:
    brokers: ["172.17.1.224:9092"]
    topic: "internal-sync-events"     # 内部事件 Topic（EventBus 层）
    group_id: "network-twin"
