# 服务全局配置
neo4j:
  uri: "bolt://172.17.1.224:7687"
  user: "neo4j"
  password: "password123"
  default_db: "neo4j"

server:
  port: 8080

snapshot:
  dir: "snapshots"
  max_active: 5
  retention_days: 30  # 0 = 不自动清理

schema:
  ontology_dir: "ontology"

channel:
  buffer_size: 100

kafka:
  enabled: false          # V2 默认关闭，逐步切换
  brokers: ["localhost:9092"]
  topic: "sync-events"
  group_id: "network-twin"
